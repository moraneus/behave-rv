name: Release

# Publishes to PyPI when a GitHub release is published, via trusted
# publishing (OIDC) -- no long-lived token stored anywhere. One-time setup on
# pypi.org is required before the first run: add a "pending publisher" for
# project "behave-rv" with owner "moraneus", repository "behave-rv", workflow
# "release.yml", environment "pypi".
on:
  release:
    types: [published]
  workflow_dispatch: {}     # dry-run the build without publishing

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write        # OIDC for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
