name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run the full suite (core + demos; no webapp deps needed)
        run: python -m pytest tests/ demo/ -q

  lint:
    name: lint (ruff — pyflakes + full PEP 8)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      # [tool.ruff.lint] in pyproject selects E, W (pycodestyle = PEP 8) and F
      # (pyflakes), line length 100. A formatter (black / ruff format) is
      # deliberately NOT enforced: the codebase predates one, and adopting it
      # would be a ~60-file mechanical churn -- see the CI commit message.
      - name: Lint
        run: ruff check behave_rv tests demo

  stability-gate:
    name: catalog diff (specification stability)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      # exits 1 on contract breaks against the committed catalog (STABILITY.md)
      - name: Diff the committed step catalog against the code
        run: |
          python -m behave_rv catalog diff \
            --steps demo/order_service/steps.py \
            --catalog demo/order_service/catalog.json \
            --policies demo/order_service/policies
      # the two-sided contract: steps AND the app's emit sites (Path D);
      # --fail-on-app-risk because the example app is itself under contract
      - name: Diff the ticketing example, both sides of the boundary
        run: |
          python -m behave_rv catalog diff \
            --steps examples/ticketing/monitoring/steps.py \
            --catalog examples/ticketing/monitoring/catalog.json \
            --policies examples/ticketing/monitoring/policies \
            --app examples/ticketing/app_service.py \
            --fail-on-app-risk
